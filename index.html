<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Color Palette Generator</title>
		<!-- <link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/> -->
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<header>
			<div class="page-title">
				<h1>Color Palette Generator</h1>
			</div>
			<div class="action-bar">
				<div class="generator-actions">
					<button class="generate-btn" id="generate-btn">
						<svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 24 24" fill="none">
							<path
								d="M4.06189 13C4.02104 12.6724 4 12.3387 4 12C4 7.58172 7.58172 4 12 4C14.5006 4 16.7332 5.14727 18.2002 6.94416M19.9381 11C19.979 11.3276 20 11.6613 20 12C20 16.4183 16.4183 20 12 20C9.61061 20 7.46589 18.9525 6 17.2916M9 17H6V17.2916M18.2002 4V6.94416M18.2002 6.94416V6.99993L15.2002 7M6 20V17.2916"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							/>
						</svg>
						Generate Palette
					</button>
				</div>
				<div>
					<button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark theme">
						<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 180 180">
							<g id="toogle-sun">
								<path
									d="M153.64,116.36l26.36-26.36-26.36-26.36V26.36h-37.28L90,0l-26.36,26.36H26.36v37.28L0,90l26.36,26.36v37.28h37.28l26.36,26.36,26.36-26.36h37.28v-37.28ZM90,140c-27.61,0-50-22.39-50-50s22.39-50,50-50,50,22.39,50,50-22.39,50-50,50Z"
								/>
							</g>
							<g id="toggle-circle"><path d="M127.5,90c0,20.71-16.79,37.5-37.5,37.5s-37.5-16.79-37.5-37.5,16.79-37.5,37.5-37.5,37.5,16.79,37.5,37.5Z" /></g>
						</svg>
					</button>
				</div>
			</div>
		</header>
		<main class="container">
			<div class="palette-container">
				<!-- COLOR BOX 1 -->
				<div class="color-box">
					<div class="color" style="background-color: #e1f5fe">
						<div class="color-info">
							<div class="hex-value text-upper">#e1f5fe</div>
							<div class="copy-btn" title="Copy to clipboard"></div>
						</div>
					</div>
				</div>
				<!-- COLOR BOX 2 -->
				<div class="color-box">
					<div class="color" style="background-color: #b3e5fc">
						<div class="color-info">
							<div class="hex-value text-upper">#b3e5fc</div>
							<div class="copy-btn" title="Copy to clipboard"></div>
						</div>
					</div>
				</div>
				<!-- COLOR BOX 3 -->
				<div class="color-box">
					<div class="color" style="background-color: #81d4fa">
						<div class="color-info">
							<div class="hex-value text-upper">#81d4fa</div>
							<div class="copy-btn" title="Copy to clipboard"></div>
						</div>
					</div>
				</div>
				<!-- COLOR BOX 4 -->
				<div class="color-box">
					<div class="color" style="background-color: #4fc3f7">
						<div class="color-info">
							<div class="hex-value text-upper">#4fc3f7</div>
							<div class="copy-btn" title="Copy to clipboard"></div>
						</div>
					</div>
				</div>
				<!-- COLOR BOX 4 -->
				<div class="color-box">
					<div class="color" style="background-color: #29b6f6">
						<div class="color-info">
							<div class="hex-value text-upper">#29b6f6</div>
							<div class="copy-btn" title="Copy to clipboard"></div>
						</div>
					</div>
				</div>
			</div>
		</main>
		<footer>
			&copy;
			<script>
				document.write(new Date().getFullYear());
			</script>
			Color Palette Generator
		</footer>

		<script src="js/script.js"></script>
		<script type="module" src="js/theme-toggle.js"></script>
	</body>
</html>
