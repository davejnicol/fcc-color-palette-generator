<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Color Palette Generator</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<div class="container">
			<h1>Color Palette Generator</h1>
			<button class="generate-btn" id="generate-btn">
				<i class="fas fa-sync-alt"></i>
				Generate Palette
			</button>
			<div class="palette-container">
				<!-- COLOR BOX 1 -->
				<div class="color-box">
					<div class="color" style="background-color: #e1f5fe"></div>
					<div class="color-info">
						<span class="hex-value text-upper">#e1f5fe</span>
						<i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
					</div>
				</div>
				<!-- COLOR BOX 2 -->
				<div class="color-box">
					<div class="color" style="background-color: #b3e5fc"></div>
					<div class="color-info">
						<span class="hex-value text-upper">#b3e5fc</span>
						<i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
					</div>
				</div>
				<!-- COLOR BOX 3 -->
				<div class="color-box">
					<div class="color" style="background-color: #81d4fa"></div>
					<div class="color-info">
						<span class="hex-value text-upper">#81d4fa</span>
						<i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
					</div>
				</div>
				<!-- COLOR BOX 4 -->
				<div class="color-box">
					<div class="color" style="background-color: #4fc3f7"></div>
					<div class="color-info">
						<span class="hex-value text-upper">#4fc3f7</span>
						<i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
					</div>
				</div>
				<!-- COLOR BOX 4 -->
				<div class="color-box">
					<div class="color" style="background-color: #29b6f6"></div>
					<div class="color-info">
						<span class="hex-value text-upper">#29b6f6</span>
						<i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
					</div>
				</div>
			</div>
		</div>

		<script src="js/script.js"></script>
	</body>
</html>
